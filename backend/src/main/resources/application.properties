spring.application.name=backend
spring.config.import=optional:file:.env[.properties]

# DATABASE CONFIG
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/ProyectoTFG}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

# SERVER PORT (Railway lo inyecta automaticamente)
server.port=${PORT:8080}
server.forward-headers-strategy=framework

# JWT CONFIG
security.jwt.key.private=${JWT_PRIVATE_KEY}
security.jwt.user.generator=${JWT_USER_GENERATOR:DUZZ-BACKEND}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
