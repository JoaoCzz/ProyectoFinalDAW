spring.application.name=backend
spring.config.import=optional:file:.env[.properties]

# DATABASE CONFIG
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/ProyectoTFG}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

# SERVER PORT
server.port=${PORT:8080}
server.forward-headers-strategy=framework

# JWT CONFIG
security.jwt.key.private=${JWT_PRIVATE_KE:3629555f0a4fd3c7916a247b548671c078717483a2e6d0a524daeb40d5b622b2}
security.jwt.user.generator=${JWT_USER_GENERATOR:DUZZ-BACKEND}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

##
server.address=0.0.0.0