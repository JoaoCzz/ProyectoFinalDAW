spring.application.name=backend

# DATABASE CONFIG
spring.jpa.hibernate.ddl-auto=create-drop
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/ProyectoTFG}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true

# SERVER PORT (Railway lo inyecta automaticamente)
server.port=${PORT:8080}

# JWT CONFIG
security.jwt.key.private=${JWT_PRIVATE_KEY:3629555f0a4fd3c7916a247b548671c078717483a2e6d0a524daeb40d5b622b2}
security.jwt.user.generator=${JWT_USER_GENERATOR:DUZZ-BACKEND}
