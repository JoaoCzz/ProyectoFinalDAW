<div class="auth-page">
  <div class="auth-card">
    <header class="auth-header">
      <h1 class="auth-title">Crea tu cuenta</h1>
      <p class="auth-subtitle">Únete a la comunidad y empieza a subir tu música.</p>
    </header>

    <form (ngSubmit)="onRegister()" class="auth-form">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="name">Nombre</label>
          <div class="input-wrapper">
            <input type="text" id="name" [(ngModel)]="formData.name" name="name" required placeholder="Ej. Juan" class="form-input" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="surname">Apellidos</label>
          <div class="input-wrapper">
            <input type="text" id="surname" [(ngModel)]="formData.surname" name="surname" required placeholder="Ej. Pérez" class="form-input" />
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="username">Usuario</label>
        <div class="input-wrapper">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          <input type="text" id="username" [(ngModel)]="formData.username" name="username" required placeholder="Nombre de usuario único" class="form-input" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <div class="input-wrapper">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
          <input type="email" id="email" [(ngModel)]="formData.email" name="email" required placeholder="tu@email.com" class="form-input" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            <input type="password" id="password" [(ngModel)]="formData.password" name="password" required placeholder="••••••••" class="form-input" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="birthDay">Fecha Nacimiento</label>
          <div class="input-wrapper">
            <input type="date" id="birthDay" [(ngModel)]="formData.birthDay" name="birthDay" required class="form-input" />
          </div>
        </div>
      </div>


      <div *ngIf="errorMessage" class="error-box">
        {{ errorMessage }}
      </div>
      
      <div *ngIf="successMessage" class="success-box">
        {{ successMessage }}
      </div>

      <button type="submit" [disabled]="isLoading" class="btn-premium btn-primary btn-full">
        <span *ngIf="!isLoading">Crear Cuenta</span>
        <div *ngIf="isLoading" class="loader-sm"></div>
      </button>
    </form>

    <footer class="auth-footer">
      <p>¿Ya tienes cuenta? <a routerLink="/auth/login">Inicia sesión</a></p>
    </footer>
  </div>
</div>
