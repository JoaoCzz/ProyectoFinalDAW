<div class="create-post-page">
  <div class="page-header">
    <button class="btn-back" routerLink="/posts">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      Volver al Feed
    </button>
    <h1 class="page-title">Subir Nueva Música</h1>
  </div>

  <div class="form-card">
    <form (ngSubmit)="onCreatePost()" class="post-form">
      <div class="promotion-toggle-card">
        <div class="toggle-info">
          <span class="toggle-title">¿Es tu propia música?</span>
          <span class="toggle-desc">Si marcas esta casilla, tu post aparecerá en la sección de "Promoción" para que la comunidad te apoye.</span>
        </div>
        <label class="switch">
          <input type="checkbox" [(ngModel)]="postData.isSelfPromotion" name="isSelfPromotion">
          <span class="slider round"></span>
        </label>
      </div>

      <div class="form-group">
        <label for="title">Título</label>
        <input
          type="text"
          id="title"
          [(ngModel)]="postData.title"
          name="title"
          required
          placeholder="¿Cómo se llama la canción?"
          class="form-input"
        />
      </div>

      <div class="form-row">
        <div class="form-group" *ngIf="!postData.isSelfPromotion">
          <label for="artist">Artista</label>
          <input 
            type="text" 
            [(ngModel)]="artistSearch" 
            name="artistSearch" 
            placeholder="Buscar artista..." 
            class="premium-input search-mini"
          />
          <select id="artist" [(ngModel)]="postData.artistId" name="artistId" required class="premium-select">
            <option [value]="0" disabled selected>Seleccionar Artista</option>
            <option *ngFor="let artist of artists" [value]="artist.id">{{ artist.name }}</option>
          </select>
        </div>

        <div class="form-group">
          <label for="genre">Género</label>
          <input 
            type="text" 
            [(ngModel)]="genreSearch" 
            name="genreSearch" 
            placeholder="Buscar género..." 
            class="premium-input search-mini"
          />
          <select id="genre" [(ngModel)]="postData.genreId" name="genreId" required class="premium-select">
            <option [value]="0" disabled selected>Seleccionar Género</option>
            <option *ngFor="let genre of genres" [value]="genre.id">{{ genre.name }}</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="musicUrl">Enlace de la Música (Spotify, SoundCloud, etc.)</label>
        <input
          type="url"
          id="musicUrl"
          [(ngModel)]="postData.musicUrl"
          name="musicUrl"
          placeholder="https://open.spotify.com/track/..."
          class="form-input"
        />
      </div>

      <div class="form-group">
        <label for="description">Descripción</label>
        <textarea
          id="description"
          [(ngModel)]="postData.description"
          name="description"
          placeholder="Cuéntale a la comunidad sobre esta canción..."
          rows="4"
          class="form-input"
        ></textarea>
      </div>

      <div *ngIf="errorMessage" class="error-box">
        {{ errorMessage }}
      </div>

      <div class="form-actions">
        <button type="button" class="btn-premium btn-outline" routerLink="/posts">Cancelar</button>
        <button type="submit" [disabled]="isLoading" class="btn-premium btn-primary">
          <span *ngIf="!isLoading">Publicar</span>
          <div *ngIf="isLoading" class="loader-sm"></div>
        </button>
      </div>
    </form>
  </div>
</div>
